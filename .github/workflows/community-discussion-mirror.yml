name: Community Discussion Mirror

on:
  schedule:
    - cron: "0 9 * * 1-5" # weekdays at 09:00 UTC
  workflow_dispatch:
    inputs:
      max_discussions:
        description: "Maximum number of discussions to mirror per run"
        required: false
        default: "10"
        type: string

permissions:
  contents: read
  discussions: write

concurrency:
  group: community-discussion-mirror-${{ github.workflow }}
  cancel-in-progress: false

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - name: Mirror discussions
        uses: actions/github-script@v7
        env:
          SOURCE_OWNER: community
          SOURCE_REPO: community
          MAX_DISCUSSIONS: ${{ github.event.inputs.max_discussions || '10' }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const SOURCE_OWNER = process.env.SOURCE_OWNER;
            const SOURCE_REPO = process.env.SOURCE_REPO;
            const SOURCE_SLUG = `${SOURCE_OWNER}/${SOURCE_REPO}`;
            const MAX_DISCUSSIONS = parseInt(process.env.MAX_DISCUSSIONS, 10);
            const MIRROR_METADATA_MARKER = 'community-discussion-mirror';

            const escSlug = SOURCE_SLUG.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');

            function buildSourceKey(sourceRepository, discussionNumber) {
              return `${sourceRepository}#${discussionNumber}`;
            }

            function extractHiddenJson(body, marker) {
              const match = String(body || '').match(new RegExp(`<!-- ${marker}\\n([\\s\\S]*?)\\n-->`));
              if (!match) {
                return null;
              }

              try {
                return JSON.parse(match[1]);
              } catch {
                return null;
              }
            }

            async function fetchExistingDiscussions() {
              const discussions = [];
              let cursor = null;

              while (true) {
                const existingQuery = await github.graphql(`
                  query($owner: String!, $name: String!, $cursor: String) {
                    repository(owner: $owner, name: $name) {
                      discussions(first: 100, after: $cursor, orderBy: {field: CREATED_AT, direction: DESC}) {
                        pageInfo {
                          hasNextPage
                          endCursor
                        }
                        nodes {
                          number
                          title
                          body
                        }
                      }
                    }
                  }
                `, { owner: context.repo.owner, name: context.repo.repo, cursor });

                const page = existingQuery.repository.discussions;
                discussions.push(...page.nodes);

                if (!page.pageInfo.hasNextPage) {
                  break;
                }

                cursor = page.pageInfo.endCursor;
              }

              return discussions;
            }

            // --- Fetch existing mirrored discussions in this repo for dedup ---
            const existingDiscussions = await fetchExistingDiscussions();
            const existingTitles = new Set(existingDiscussions.map(d => d.title));
            const existingSourceKeys = new Set(
              existingDiscussions
                .map((discussion) => extractHiddenJson(discussion.body, MIRROR_METADATA_MARKER))
                .filter((metadata) => metadata?.source_repository && metadata?.source_discussion_number)
                .map((metadata) => buildSourceKey(metadata.source_repository, metadata.source_discussion_number))
            );

            // --- Fetch destination categories ---
            const destCatsQuery = await github.graphql(`
              query($owner: String!, $name: String!) {
                repository(owner: $owner, name: $name) {
                  discussionCategories(first: 25) {
                    nodes { id name }
                  }
                }
              }
            `, { owner: context.repo.owner, name: context.repo.repo });
            const destCategories = destCatsQuery.repository.discussionCategories.nodes;
            const destCatByName = Object.fromEntries(destCategories.map(c => [c.name, c.id]));
            // --- Fetch latest source discussions ---
            const sourceQuery = await github.graphql(`
              query($owner: String!, $name: String!) {
                repository(owner: $owner, name: $name) {
                  discussions(first: 20, orderBy: {field: CREATED_AT, direction: DESC}) {
                    nodes {
                      id
                      number
                      title
                      body
                      category { name }
                      labels(first: 20) {
                        nodes { name }
                      }
                    }
                  }
                }
              }
            `, { owner: SOURCE_OWNER, name: SOURCE_REPO });
            const sourceDiscussions = sourceQuery.repository.discussions.nodes;

            // --- Filter to un-mirrored, take at most MAX ---
            const toMirror = sourceDiscussions
              .filter((discussion) => {
                const sourceKey = buildSourceKey(SOURCE_SLUG, discussion.number);
                if (existingSourceKeys.has(sourceKey)) {
                  return false;
                }

                // Legacy fallback for mirrors created before source metadata was embedded.
                return !existingTitles.has(discussion.title);
              })
              .slice(0, MAX_DISCUSSIONS);

            if (toMirror.length === 0) {
              core.info('No new discussions to mirror.');
              return;
            }

            // --- Content cleaning helpers ---
            function cleanBody(body) {
              let cleaned = String(body || '');
              // Remove URLs linking to source repo discussions/issues
              const urlRe = new RegExp(`https?://github\\.com/${escSlug}/(discussions|issues)/\\d+\\S*`, 'g');
              cleaned = cleaned.replace(urlRe, '');
              // Remove markdown links to the source repo entirely
              const markdownSourceLinkRe = new RegExp(`\\[[^\\]]*\\]\\(https?://github\\.com/${escSlug}[^)]*\\)`, 'gi');
              cleaned = cleaned.replace(markdownSourceLinkRe, '');
              // Remove source/repo#NNN references
              const refRe = new RegExp(`${escSlug}#\\d+`, 'gi');
              cleaned = cleaned.replace(refRe, '');
              // Remove plain source repo mentions so GitHub cannot autolink them
              const slugRe = new RegExp(`(?<![\\w`])${escSlug}(?![\\w`])`, 'gi');
              cleaned = cleaned.replace(slugRe, '');
              // Remove bare #NNN references (only whole-word)
              cleaned = cleaned.replace(/(?<!\w)#\d+(?!\w)/g, '');
              // Remove sentences containing mirror/import phrases
              cleaned = cleaned.replace(/[^\n.]*\b(original discussion|cross-post|imported from|mirrored from)\b[^\n.]*/gi, '');
              // Escape org/repo#123 autolinks by wrapping in backticks
              cleaned = cleaned.replace(/(?<!`)(\w+\/\w+#\d+)(?!`)/g, '`$1`');
              // Remove any lines that only contain punctuation or markdown artifacts after stripping source refs
              cleaned = cleaned
                .split('\n')
                .filter((line) => !/^[\s()\[\]<>:.-]*$/.test(line))
                .join('\n');
              // Collapse multiple blank lines
              cleaned = cleaned.replace(/\n{3,}/g, '\n\n');
              return cleaned.trim();
            }

            function buildMirrorMetadata(discussion) {
              return [
                `<!-- ${MIRROR_METADATA_MARKER}`,
                JSON.stringify({
                  source_repository: SOURCE_SLUG,
                  source_discussion_number: discussion.number,
                  mirrored_at: new Date().toISOString(),
                  prediction_status: 'unlabelled-shadow'
                }, null, 2),
                '-->'
              ].join('\n');
            }

            // --- Get default category (first available) ---
            const defaultCatId = destCategories.length > 0 ? destCategories[0].id : null;

            // --- Create mirrored discussions ---
            const repositoryId = (await github.graphql(`
              query($owner: String!, $name: String!) {
                repository(owner: $owner, name: $name) { id }
              }
            `, { owner: context.repo.owner, name: context.repo.repo })).repository.id;

            for (const disc of toMirror) {
              const title = disc.title;
              const cleanedBody = cleanBody(disc.body);
              const body = [cleanedBody, '', buildMirrorMetadata(disc)].filter(Boolean).join('\n\n');

              // Category: exact match or default
              const catName = disc.category?.name;
              const categoryId = (catName && destCatByName[catName]) || defaultCatId;

              if (!categoryId) {
                core.warning(`Skipping "${title}": no discussion category available.`);
                continue;
              }

              // Create discussion via GraphQL
              const createResult = await github.graphql(`
                mutation($repositoryId: ID!, $categoryId: ID!, $title: String!, $body: String!) {
                  createDiscussion(input: {
                    repositoryId: $repositoryId,
                    categoryId: $categoryId,
                    title: $title,
                    body: $body
                  }) {
                    discussion { id number }
                  }
                }
              `, { repositoryId, categoryId, title, body });

              const newDisc = createResult.createDiscussion.discussion;
              core.info(`Created discussion #${newDisc.number}: ${title}`);
            }
